name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci
        env:
          # Ensure devDependencies (Vite, ESLint, Vitest, …) install even if the runner sets NODE_ENV=production
          NODE_ENV: development

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Production build
        run: npm run build
        env:
          # CI smoke build; set repo Variable VITE_PUBLIC_SITE_URL for release builds if needed
          VITE_PUBLIC_SITE_URL: ""
