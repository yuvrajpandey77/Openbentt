<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/openbentt-favicon.svg" />
    <title>Openbentt | desktop-first AI workspace for researchers</title>
    <meta
      name="description"
      content="Your research should not leave your machine. Openbentt is a desktop-first, local-first AI workspace for LaTeX, PDFs, benchmarking, and offline GGUF. Optional web chat and Notebook. Windows, macOS, and Linux."
    />
    <meta name="author" content="Openbentt" />
    <meta name="google-site-verification" content="lr8hQLP1wBYcAydKMsT0jKUV1NSB3tjzqnLfMkxuUfw" />
    <!-- Additional SEO (canonical, Open Graph, Twitter, JSON-LD) is injected at build time in vite.config.ts -->
    <script>
      (function () {
        var standalone =
          window.matchMedia("(display-mode: standalone)").matches ||
          window.navigator.standalone === true;
        if (!standalone) return;
        var p = location.pathname;
        var ok =
          p === "/chat" ||
          p.indexOf("/chat/") === 0 ||
          p === "/setup" ||
          p.indexOf("/share") === 0;
        if (!ok) location.replace("/chat");
        var tc = document.querySelector('meta[name="theme-color"]');
        if (!tc) {
          tc = document.createElement("meta");
          tc.name = "theme-color";
          document.head.appendChild(tc);
        }
        tc.content = "#000000";
        var touch180 = document.getElementById("openbentt-chat-touch-icon-180");
        if (!touch180) {
          touch180 = document.createElement("link");
          touch180.id = "openbentt-chat-touch-icon-180";
          touch180.rel = "apple-touch-icon";
          touch180.sizes = "180x180";
          touch180.href = "/cobentt-pwa-icon-180.png";
          document.head.appendChild(touch180);
        }
        var touch = document.getElementById("openbentt-chat-touch-icon");
        if (!touch) {
          touch = document.createElement("link");
          touch.id = "openbentt-chat-touch-icon";
          touch.rel = "apple-touch-icon";
          touch.sizes = "1024x1024";
          touch.href = "/cobentt-pwa-icon-1024.png";
          document.head.appendChild(touch);
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
