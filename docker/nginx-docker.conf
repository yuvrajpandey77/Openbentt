server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Modest security defaults. CSP is intentionally not set because the app uses WASM
    # (BusyTeX, transformers.js) and dynamic module imports; configure a strict CSP at the edge
    # if your deployment doesn't need those.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Cache hashed Vite assets aggressively; never cache index.html (routes point at fresh bundle).
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|png|jpg|jpeg|svg|webp|mjs)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/research {
        proxy_pass http://127.0.0.1:8787/research;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 4m;
    }
}
